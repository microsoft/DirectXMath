name: 'CMake (MinGW)'

on:
  push:
    branches: "main"
    paths-ignore:
      - '*.md'
      - LICENSE
      - '.azuredevops/**'
      - '.github/*.md'
      - '.nuget/*'
      - build/*.ps1
  pull_request:
    branches: "main"
    paths-ignore:
      - '*.md'
      - LICENSE
      - '.azuredevops/**'
      - '.github/*.md'
      - '.nuget/*'
      - build/*.ps1

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 20

    strategy:
      fail-fast: false

      matrix:
        build_type: [x64-Debug-MinGW, x64-Release-MinGW]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Clone test repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: walbourn/directxmathtest
          path: Tests
          ref: main

      - name: 'Install Ninja'
        run: choco install ninja

      - name: 'Configure CMake'
        working-directory: ${{ github.workspace }}
        run: cmake --preset=${{ matrix.build_type }} -DBUILD_TESTING=ON

      - name: 'Build'
        working-directory: ${{ github.workspace }}
        run: cmake --build out/build/${{ matrix.build_type }}

  buildNew:
    runs-on: windows-2025
    timeout-minutes: 20

    strategy:
      fail-fast: false

      matrix:
        build_type: [x64-Debug-MinGW, x64-Release-MinGW]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Clone test repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: walbourn/directxmathtest
          path: Tests
          ref: main

      - name: 'Install Ninja'
        run: choco install ninja

      - name: 'Configure CMake'
        working-directory: ${{ github.workspace }}
        run: cmake --preset=${{ matrix.build_type }} -DBUILD_TESTING=ON

      - name: 'Build'
        working-directory: ${{ github.workspace }}
        run: cmake --build out/build/${{ matrix.build_type }}
